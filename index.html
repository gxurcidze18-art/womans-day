<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>
<style>
body{
  margin:0;
  height:100vh;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial, sans-serif;
  overflow:hidden;
  flex-direction: column;
  text-align:center;
}

h1{
  font-size:50px;
  color:pink;
  margin-bottom:20px;
  text-shadow:0 0 15px rgba(0,0,0,0.3);
}

#message{
  font-size:28px;
  color:pink;
  margin-bottom:20px;
  text-shadow:0 0 5px rgba(0,0,0,0.2);
}

button{
  padding:12px 25px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#ff4f91;
  cursor:pointer;
  margin:5px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
  transition:transform 0.2s;
}
button:hover{
  transform:scale(1.1);
}

.flower{
  position:absolute;
  top:-50px;
  font-size:35px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

#bouquet{
  font-size:60px;
  margin-top:30px;
  display:none;
  animation:pop 1s ease forwards;
}

#photoSurprise{
  width:200px;
  margin-top:20px;
  display:none;
  animation:float 3s ease-in-out infinite, pop 1s ease forwards;
}

@keyframes pop{
  0% {transform:scale(0.2);opacity:0;}
  50% {transform:scale(1.2);opacity:1;}
  100% {transform:scale(1);}
}

@keyframes float{
  0% {transform:translateY(0px);}
  50% {transform:translateY(-20px);}
  100% {transform:translateY(0px);}
}
</style>
</head>
<body>

<h1 id="greeting">Hello Babelina 🌸💖</h1>
<div id="message">Say hello to continue 🌷</div>
<div id="buttons">
  <button id="helloBtn">Hello 🌸</button>
</div>

<div id="bouquet">💐🌹🌸💖🌷</div>
<img id="photoSurprise" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjmM2Yrwak4Io7Nv_v47hP0QhDZac7eox2vQ&s" alt="Cute Surprise Photo">

<script>
let step=0;
const greeting = document.getElementById("greeting");
const message = document.getElementById("message");
const buttonsDiv = document.getElementById("buttons");
const helloBtn = document.getElementById("helloBtn");
const bouquet = document.getElementById("bouquet");
const photo = document.getElementById("photoSurprise");

function createFlower(){
  let f = document.createElement("div");
  f.className = "flower";
  const flowers=["🌸","🌹","💐","🌷","💖"];
  f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),8000);
}
setInterval(createFlower,300);

// Step 1: Hello button
helloBtn.onclick=function(){
  step=1;
  greeting.innerHTML="Hi my love! 😘";
  message.innerHTML="I’m sorry I wasn’t able to give you flowers… but I still have something for you. Do you want to see it? 💐💖";
  buttonsDiv.innerHTML=`<button id="yesBtn">Yes 🌸</button><button id="noBtn">No 😅</button>`;
  
  document.getElementById("yesBtn").onclick=showSurprise;
  document.getElementById("noBtn").onclick=noFirst;
}

// First No
function noFirst(){
  step=2;
  message.innerHTML="Come on, pleaseee 😅💖🌸";
}

// Second No
function noSecond(){
  step=3;
  message.innerHTML="😘 Please give me a chance! 🌷💐";
  buttonsDiv.innerHTML=`<button id="yesBtnOnly">Yes 🌸</button>`;
  document.getElementById("yesBtnOnly").onclick=showSurprise;
}

// Show Surprise (flowers + bouquet + photo + final message)
function showSurprise(){
  message.innerHTML="🌸🎉 Happy Women’s Day my love! I love you 💖🌹🌷";
  buttonsDiv.style.display="none";
  bouquet.style.display="block";
  photo.style.display="block";
}

// Redefine no button click based on step
buttonsDiv.addEventListener('click',function(e){
  if(e.target && e.target.id==='noBtn'){
    if(step===1) noFirst();
    else if(step===2) noSecond();
  }
});
</script>
</body>
</html>
