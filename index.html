<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>
<style>
body{
  margin:0;
  height:100vh;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial, sans-serif;
  overflow:hidden;
  flex-direction: column;
  text-align:center;
}

h1{
  font-size: 50px;
  color:pink;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(0,0,0,0.3);
}

#message{
  font-size:28px;
  color:pink;
  margin-bottom:20px;
  text-shadow:0 0 5px rgba(0,0,0,0.2);
}

button{
  padding: 12px 25px;
  font-size: 20px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#ff4f91;
  cursor:pointer;
  margin:5px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
button:hover{
  transform: scale(1.1);
}

.flower{
  position:absolute;
  top:-50px;
  font-size:35px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

#bouquet{
  font-size:60px;
  margin-top:30px;
  display:none;
  animation:pop 1s ease forwards;
}

#minionGif{
  width:200px;
  margin-top:20px;
  display:none;
  animation:float 3s ease-in-out infinite, pop 1s ease forwards;
}

@keyframes pop{
  0% { transform: scale(0.2); opacity:0; }
  50% { transform: scale(1.2); opacity:1; }
  100% { transform: scale(1); }
}
@keyframes float{
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>
<h1>Hello Babelina 🌸💖</h1>
<div id="message">Do you want to see your surprise? 😘💐</div>
<div id="buttons">
  <button id="yesBtn">Yes 🌸</button>
  <button id="noBtn">No 😅</button>
</div>
<div id="bouquet">💐🌹🌸💖🌷</div>
<img id="minionGif" src="https://media.tenor.com/images/be4179803a428ee7567fb209f1f854e4/tenor.gif" alt="Minion sending kiss">

<script>
let step = 0;
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");
const bouquet = document.getElementById("bouquet");
const minionGif = document.getElementById("minionGif");

function createFlower(){
  let f = document.createElement("div");
  f.className = "flower";
  const flowers = ["🌸","🌹","💐","🌷","💖"];
  f.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (3+Math.random()*5) + "s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),8000);
}

setInterval(createFlower,300);

// Yes button logic
yesBtn.onclick = function(){
  // Part 3 or 5 → always show flowers and GIF
  message.innerHTML = "🌸🎉 Happy Women’s Day my love! I love you 💖🌹🌷";
  document.getElementById("buttons").style.display = "none";
  bouquet.style.display = "block";
  minionGif.style.display = "block";
}

// No button logic
noBtn.onclick = function(){
  if(step===0){
    // First No → playful response
    message.innerHTML="😅 Come on, pleaseee! 💖🌸";
    step++;
  } else if(step===1){
    // Second No → final playful message
    message.innerHTML="😘 Give me a chance! 🌷💐";
    yesBtn.textContent="Yes 🌸";
    noBtn.style.display="none"; // only Yes left
    step++;
  }
}
</script>
</body>
</html>
